version: 2

models:
  - name: stg_section1
    description: "Staged CLIMAT monthly observations derived from DWD 'RAW CLIMATs' Section 1. Contains core monthly means/totals."
    columns:
      - name: year
        description: "Observation year (YYYY)."
        tests:
          - not_null
      - name: month
        description: "Observation month (1-12)."
        tests:
          - not_null
      - name: station_id
        description: "WMO station number (IIiii) identifying the reporting station."
        tests:
          - not_null
      - name: atm_station_height
        description: "Mean monthly air pressure reduced to station level, unit: hPa."
      - name: atm_sea_level
        description: "Mean monthly air pressure reduced to mean sea level, unit: hPa."
      - name: temp_mean_monthly
        description: "Mean monthly air temperature, unit: °C."
      - name: temp_max_monthly
        description: "Mean monthly daily maximum temperature, unit: °C."
      - name: temp_min_monthly
        description: "Mean monthly daily minimum temperature, unit: °C."
      - name: vapor_pressure_mean
        description: "Mean monthly water vapour pressure, unit: hPa."
      - name: precip_monthly
        description: "Monthly precipitation total, unit: mm."
      - name: precip_days_count
        description: "Number of days with measurable precipitation."
      - name: rainy_days_count
        description: "Number of rainy days."
      - name: sunshine_duration_hours
        description: "Monthly sunshine duration, unit: hours."
      - name: station_pressure
        description: "Station pressure, unit: hPa."

  - name: stg_section2
    description: "Staged Section 2 data containing additional monthly elements and normals."
    columns:
      - name: year
        description: "Observation year."
      - name: month
        description: "Observation month."
      - name: station_id
        description: "WMO station number."

  - name: stg_section3
    description: "Staged Section 3 data containing days with parameters exceeding specific threshold values."
    columns:
      - name: station_id
        description: "WMO station number."
      - name: no_of_days_max_temp_25_c_or_higher
        description: "Days with maximum temperature >= 25°C."
      - name: no_of_days_max_temp_30_c_or_higher
        description: "Days with maximum temperature >= 30°C."
      - name: no_of_days_max_temp_35_c_or_higher
        description: "Days with maximum temperature >= 35°C."
      - name: no_of_days_max_temp_40_c_or_higher
        description: "Days with maximum temperature >= 40°C."
      - name: no_of_days_min_temp_lt_0_c
        description: "Days with minimum temperature < 0°C."
      - name: no_of_days_max_temp_lt_0_c
        description: "Days with maximum temperature < 0°C."
      - name: no_of_days_precip_1_0_mm_or_more
        description: "Days with precipitation >= 1.0 mm."
      - name: no_of_days_precip_5_0_mm_or_more
        description: "Days with precipitation >= 5.0 mm."
      - name: no_of_days_precip_10_0_mm_or_more
        description: "Days with precipitation >= 10.0 mm."
      - name: no_of_days_precip_50_0_mm_or_more
        description: "Days with precipitation >= 50.0 mm."
      - name: no_of_days_precip_100_0_mm_or_more
        description: "Days with precipitation >= 100.0 mm."
      - name: no_of_days_precip_150_0_mm_or_more
        description: "Days with precipitation >= 150.0 mm."
      - name: no_of_days_snow_depth_gt_0_cm
        description: "Days with snow depth > 0 cm."
      - name: no_of_days_snow_depth_gt_1_cm
        description: "Days with snow depth >= 1 cm."
      - name: no_of_days_snow_depth_gt_10_cm
        description: "Days with snow depth >= 10 cm."
      - name: no_of_days_snow_depth_gt_50_cm
        description: "Days with snow depth >= 50 cm."
      - name: no_of_days_wind_speed_10_mps_or_more
        description: "Days with wind speed >= 10 m/s."
      - name: no_of_days_wind_speed_20_mps_or_more
        description: "Days with wind speed >= 20 m/s."
      - name: no_of_days_wind_speed_30_mps_or_more
        description: "Days with wind speed >= 30 m/s."
      - name: no_of_days_visibility_lt_50_m
        description: "Days with visibility < 50m."
      - name: no_of_days_visibility_lt_100_m
        description: "Days with visibility < 100m."
      - name: no_of_days_visibility_lt_1000_m
        description: "Days with visibility < 1000m."

  - name: stg_section4
    description: "Staged Section 4 data containing extreme values of temperature, precipitation, and wind speed."
    columns:
      - name: station_id
        description: "WMO station number."
      - name: Txd
        description: "Maximum daily temperature absolute maximum (°C)"
      - name: Tnd
        description: "Minimum daily temperature absolute minimum (°C)"
      - name: Tax
        description: "Absolute maximum temperature for the period (°C)"
      - name: Tan
        description: "Absolute minimum temperature for the period (°C)"
      - name: Rx
        description: "Maximum daily precipitation (mm)"
      - name: fx
        description: "Maximum wind speed (m/s)"